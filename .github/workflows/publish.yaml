name: publish-icons
on:
  push:
    branches:
    - 'master'
    paths:
    - 'package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup publish
        uses: actions/setup-node@v6
        with:
          node-version: '14.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@rancher'

      # Ensure latest npm version is installed - 11.5.1 is required to pass OIDC token to npm publish
      - name: Update npm
        run: npm install -g npm@latest

      - name: Run publish script     
        run: |
          git config --global user.name 'Rancher Icons'
          git config --global user.email 'noreply@rancher.com'
          yarn install
          yarn run upload -i
